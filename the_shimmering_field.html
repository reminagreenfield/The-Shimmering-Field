const SCALE = 1.0;

const colors = new Float32Array(positions.count * 3);

for (let i = 0; i < positions.count; i++) {
  const ix = i % GS;
  const iz = Math.floor(i / GS);
  const fi = iz * GS + ix;

  const decomp = F_DECOMP[fi] || 0;
  const toxic = F_TOXIC[fi] || 0;

  // Height from decomposition (organic accumulation)

  positions.setY(i, height);

  // Color: blend fungal (cyan-green) vs toxic (amber-red) vs base (dark earth)
  const baseR = 0.04 + decomp * 0.015;
  const baseG = 0.06 + decomp * 0.01;
  const baseB = 0.03 + decomp * 0.005;

  const toxR = toxic * 0.6;
  const toxG = toxic * 0.15;
  const toxB = toxic * 0.02;

  const funR = fungal * 0.01;
  const funG = fungal * 0.08;
  const funB = fungal * 0.06;

  colors[i * 3] = Math.min(baseR + toxR + funR, 1);
  colors[i * 3 + 1] = Math.min(baseG + toxG + funG, 1);
  colors[i * 3 + 2] = Math.min(baseB + toxB + funB, 1);

      for (const [dx, dz] of neighbors) {
        const nf = F_FUNGAL[(iz + dz) * GS + (ix + dx)];
        if (nf > threshold * 0.7) {
          const x1 = (ix - GS / 2) * SCALE;
          const z1 = (iz - GS / 2) * SCALE;
          const y1 = (F_DECOMP[iz * GS + ix] || 0) * 0.35 + f * 0.08 + 0.05;
          const x2 = (ix + dx - GS / 2) * SCALE;
          const z2 = (iz + dz - GS / 2) * SCALE;
          const y2 = (F_DECOMP[(iz + dz) * GS + (ix + dx)] || 0) * 0.35 + nf * 0.08 + 0.05;
          fungalPts.push(x1, y1, z1, x2, y2, z2);
          const intensity = Math.min(f / 5, 1);
          fungalColors.push(0.1, 0.8 * intensity, 0.5 * intensity, 0.1, 0.8 * Math.min(nf / 5, 1), 0.5 * Math.min(nf / 5, 1));
        }
      }
    }
  }
}
if (fungalPts.length > 0) {
  const fungalGeo = new THREE.BufferGeometry();
  fungalGeo.setAttribute('position', new THREE.Float32BufferAttribute(fungalPts, 3));
  fungalGeo.setAttribute('color', new THREE.Float32BufferAttribute(fungalColors, 3));
  const fungalMat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.6, linewidth: 1 });
  const fungalLines = new THREE.LineSegments(fungalGeo, fungalMat);
  scene.add(fungalLines);
}

// ═══════════════════════════════════════════════════════════
// ORGANISMS
// ═══════════════════════════════════════════════════════════
const orgGroup = new THREE.Group();
scene.add(orgGroup);
const orgMeshes = [];

function getRole(mods) {
  const hasPhoto = mods.includes(0);
  const hasConsume = mods.includes(2);
  if (hasPhoto && !hasConsume) return 'producer';
  if (hasConsume && !hasPhoto) return 'consumer';
  if (hasPhoto && hasConsume) return 'composite';
  return 'other';
}

function buildOrganism(o) {
  const [r, c, energy, age, mods, active, vl, hjk, mc, gs, gcp, mature, rel, lys] = o;
  const role = getRole(mods);
  const x = (c - 0.5) * GS * SCALE;
  const z = (r - 0.5) * GS * SCALE;

  // Sample terrain height at position
  const ix = Math.floor(c * GS);
  const iz = Math.floor(r * GS);
  const fi = Math.min(iz * GS + ix, GS * GS - 1);
  const baseY = (F_DECOMP[fi] || 0) * 0.35 + (F_FUNGAL[fi] || 0) * 0.08;

  const group = new THREE.Group();
  group.position.set(x, baseY, z);

  const scale = 0.15 + (energy / 150) * 0.25 + mc * 0.15;
  const stressColor = gs > 2 ? 0xff3030 : gs > 1 ? 0xff8040 : null;

  if (role === 'producer') {
    // Vertical spire — sessile photosynthesizer
    const h = scale * (2 + age / 80);
    const geo = new THREE.ConeGeometry(scale * 0.4, h, 5 + mc * 2);
    const color = stressColor || (lys > 0.3 ? 0x40a080 : 0x2d8a4e);
    const mat = new THREE.MeshStandardMaterial({
      color, roughness: 0.7, metalness: 0.15,
      emissive: gcp > 0 ? 0xff4020 : (lys > 0.5 ? 0x104030 : 0x000000),
      emissiveIntensity: gcp > 0 ? 0.5 : (lys > 0.5 ? 0.3 : 0),
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.y = h / 2;
    mesh.castShadow = true;
    group.add(mesh);

    // Viral load indicator — small orbiting sphere
    if (vl > 0.2) {
      const vgeo = new THREE.SphereGeometry(scale * 0.15, 6, 6);
      const vmat = new THREE.MeshStandardMaterial({
        color: 0xcc3060, emissive: 0xcc3060, emissiveIntensity: 0.4,
        transparent: true, opacity: 0.7
      });
      const vmesh = new THREE.Mesh(vgeo, vmat);
      vmesh.position.set(scale * 0.8, h * 0.6, 0);
      group.add(vmesh);
    }
  } else if (role === 'consumer') {
    // Angular predatory form
    const s = scale * 1.2;
    const geo = new THREE.OctahedronGeometry(s, 0);
    const color = stressColor || (mods.includes(10) ? 0xd4a040 : 0xc45030);
    const mat = new THREE.MeshStandardMaterial({
      color, roughness: 0.5, metalness: 0.3,
      emissive: hjk > 0.5 ? 0x8020a0 : 0x000000,
      emissiveIntensity: hjk > 0.5 ? 0.4 : 0,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.y = s;
    mesh.rotation.y = age * 0.1;
    mesh.castShadow = true;
    group.add(mesh);
  } else if (role === 'composite') {
    // Layered endosymbiotic form — producer + consumer merged
    const s = scale * 1.5;
    // Inner: producer core
    const innerGeo = new THREE.IcosahedronGeometry(s * 0.5, 1);
    const innerMat = new THREE.MeshStandardMaterial({
      color: 0x2d8a4e, roughness: 0.6, metalness: 0.2,
      emissive: 0x104020, emissiveIntensity: 0.2,
    });
    const inner = new THREE.Mesh(innerGeo, innerMat);
    inner.position.y = s;
    group.add(inner);
    // Outer: consumer shell
    const outerGeo = new THREE.IcosahedronGeometry(s * 0.8, 0);
    const outerMat = new THREE.MeshStandardMaterial({
      color: 0xd4a040, roughness: 0.3, metalness: 0.4,
      transparent: true, opacity: 0.4,
      emissive: 0x302010, emissiveIntensity: 0.15,
    });
    const outer = new THREE.Mesh(outerGeo, outerMat);
    outer.position.y = s;
    group.add(outer);
    outer.castShadow = true;
  } else {
    // Other: small sphere
    const geo = new THREE.SphereGeometry(scale * 0.5, 6, 6);
    const mat = new THREE.MeshStandardMaterial({ color: 0x808080, roughness: 0.8 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.y = scale;
    group.add(mesh);
  }

  // Merger rings
  for (let m = 0; m < mc; m++) {
    const ringGeo = new THREE.TorusGeometry(scale * (1 + m * 0.4), scale * 0.04, 8, 16);
    const ringMat = new THREE.MeshStandardMaterial({
      color: 0x60d0a0, emissive: 0x40a080, emissiveIntensity: 0.3,
      transparent: true, opacity: 0.5,
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.y = scale * (1.5 + m * 0.3);
    ring.rotation.x = Math.PI / 2 + m * 0.3;
    group.add(ring);
  }

  // Relationship halo
  if (rel > 0.5) {
    const haloGeo = new THREE.RingGeometry(scale * 1.2, scale * 1.4, 16);
    const haloMat = new THREE.MeshBasicMaterial({
      color: 0x80c0ff, transparent: true, opacity: rel * 0.15,
      side: THREE.DoubleSide,
    });
    const halo = new THREE.Mesh(haloGeo, haloMat);
    halo.position.y = 0.1;
    halo.rotation.x = -Math.PI / 2;
    group.add(halo);
  }

  group.userData = { role, energy, age, mods, mc, gs: gs, gcp, mature, vl, hjk, lys, rel };
  orgGroup.add(group);
  orgMeshes.push(group);
}

ORGS.forEach(o => buildOrganism(o));

// ═══════════════════════════════════════════════════════════
// PARTICLES — spores / mediator signals
// ═══════════════════════════════════════════════════════════
const particleCount = 500;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
const particleSizes = new Float32Array(particleCount);
for (let i = 0; i < particleCount; i++) {
  particlePositions[i * 3] = (Math.random() - 0.5) * GS * SCALE;
  particlePositions[i * 3 + 1] = Math.random() * 8 + 0.5;
  particlePositions[i * 3 + 2] = (Math.random() - 0.5) * GS * SCALE;
  particleSizes[i] = Math.random() * 2 + 0.5;
}
particleGeo.setAttribute('position', new THREE.Float32BufferAttribute(particlePositions, 3));
particleGeo.setAttribute('size', new THREE.Float32BufferAttribute(particleSizes, 1));
const particleMat = new THREE.PointsMaterial({
  color: 0x80e0a0, size: 0.08, transparent: true, opacity: 0.3,
  sizeAttenuation: true, blending: THREE.AdditiveBlending,
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ═══════════════════════════════════════════════════════════
// INTERACTION
// ═══════════════════════════════════════════════════════════
let autoRotate = true;
let viewMode = 'terrain';
let mouseX = 0, mouseY = 0;
let targetCamX = 30, targetCamY = 25, targetCamZ = 30;
let isDragging = false, prevMX = 0, prevMY = 0;
let camAngle = Math.PI / 4, camDist = 42, camHeight = 25;

document.addEventListener('mousedown', (e) => { isDragging = true; prevMX = e.clientX; prevMY = e.clientY; });
document.addEventListener('mouseup', () => { isDragging = false; });
document.addEventListener('mousemove', (e) => {
  mouseX = e.clientX; mouseY = e.clientY;
  if (isDragging) {
    const dx = e.clientX - prevMX;
    const dy = e.clientY - prevMY;
    camAngle += dx * 0.005;
    camHeight = Math.max(5, Math.min(45, camHeight - dy * 0.1));
    prevMX = e.clientX; prevMY = e.clientY;
    autoRotate = false;
    document.getElementById('btnRotate').classList.remove('active');
  }
});
document.addEventListener('wheel', (e) => {
  camDist = Math.max(15, Math.min(70, camDist + e.deltaY * 0.03));
});

function setView(mode) {
  viewMode = mode;
  document.querySelectorAll('#controls button').forEach(b => {
    if (b.id !== 'btnRotate') b.classList.remove('active');
  });
  document.getElementById('btn' + mode.charAt(0).toUpperCase() + mode.slice(1)).classList.add('active');

  if (mode === 'terrain') { camDist = 42; camHeight = 25; }
  else if (mode === 'field') { camDist = 50; camHeight = 38; }
  else if (mode === 'organism') { camDist = 25; camHeight = 12; }
}

function toggleRotate() {
  autoRotate = !autoRotate;
  document.getElementById('btnRotate').classList.toggle('active', autoRotate);
}

// ═══════════════════════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════════════════════
const statsEl = document.getElementById('stats');
statsEl.innerHTML = `PRODUCERS 373 · HERBIVORES 140 · CARNIVORES 22<br>MERGERS 34 · COMPOSITES 82 · CASCADING 18`;

// ═══════════════════════════════════════════════════════════
// RAYCASTER FOR TOOLTIPS
// ═══════════════════════════════════════════════════════════
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const tooltipEl = document.getElementById('tooltip');
let hoveredOrg = null;

function updateTooltip() {
  mouse.x = (mouseX / W) * 2 - 1;
  mouse.y = -(mouseY / H) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  let closest = null;
  let closestDist = 3;

  for (const org of orgMeshes) {
    const dist = raycaster.ray.distanceToPoint(org.position);
    if (dist < closestDist) {
      closestDist = dist;
      closest = org;
    }
  }

  if (closest && closest !== hoveredOrg) {
    hoveredOrg = closest;
    const d = closest.userData;
    const modNames = d.mods.map(m => MODULE_NAMES[m]).join(' · ');
    let status = [];
    if (d.mc > 0) status.push(`COMPOSITE (${d.mc}× merged)`);
    if (d.gcp > 0) status.push('GENOMIC CASCADE');
    if (d.vl > 0.2) status.push(`VIRAL LOAD ${d.vl.toFixed(1)}`);
    if (d.hjk > 0.3) status.push('HIJACKED');
    if (d.lys > 0.3) status.push(`LYSOGENIC ${d.lys.toFixed(1)}`);
    if (d.rel > 0.5) status.push(`BONDED (${d.rel.toFixed(1)})`);

    tooltipEl.innerHTML = `<b style="color:rgba(180,220,160,0.9)">${d.role.toUpperCase()}</b> · age ${d.age}<br>` +
      `energy ${d.energy} · stress ${d.gs.toFixed(1)}<br>` +
      `<span style="opacity:0.6">${modNames}</span>` +
      (status.length ? `<br><span style="color:rgba(255,180,100,0.8)">${status.join('<br>')}</span>` : '');
    tooltipEl.style.display = 'block';
    tooltipEl.style.left = (mouseX + 16) + 'px';
    tooltipEl.style.top = (mouseY - 16) + 'px';
  } else if (!closest) {
    hoveredOrg = null;
    tooltipEl.style.display = 'none';
  } else if (hoveredOrg) {
    tooltipEl.style.left = (mouseX + 16) + 'px';
    tooltipEl.style.top = (mouseY - 16) + 'px';
  }
}

// ═══════════════════════════════════════════════════════════
// ANIMATE
// ═══════════════════════════════════════════════════════════
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Camera
  if (autoRotate) camAngle += 0.002;
  camera.position.x = Math.cos(camAngle) * camDist;
  camera.position.z = Math.sin(camAngle) * camDist;
  camera.position.y = camHeight;
  camera.lookAt(0, 3, 0);

  // Animate organisms
  orgMeshes.forEach((org, i) => {
    const d = org.userData;
    // Gentle breathing
    const breath = 1 + Math.sin(t * 1.5 + i * 0.7) * 0.03;
    org.scale.setScalar(breath);

    // Cascade organisms pulse red
    if (d.gcp > 0) {
      org.children.forEach(child => {
        if (child.material && child.material.emissiveIntensity !== undefined) {
          child.material.emissiveIntensity = 0.3 + Math.sin(t * 4 + i) * 0.2;
        }
      });
    }

    // Merger rings rotate
    org.children.forEach(child => {
      if (child.geometry && child.geometry.type === 'TorusGeometry') {
        child.rotation.z = t * 0.5 + i;
      }
    });
  });

  // Particles drift
  const ppos = particles.geometry.attributes.position;
  for (let i = 0; i < particleCount; i++) {
    ppos.array[i * 3 + 1] += Math.sin(t * 0.3 + i * 0.1) * 0.003;
    ppos.array[i * 3] += Math.cos(t * 0.2 + i * 0.15) * 0.002;
    if (ppos.array[i * 3 + 1] > 10) ppos.array[i * 3 + 1] = 0.5;
  }
  ppos.needsUpdate = true;

  // Underglow pulse
  underglow.intensity = 0.3 + Math.sin(t * 0.8) * 0.1;

  updateTooltip();
  renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});
</script>
</body>
</html>
